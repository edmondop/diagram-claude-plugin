name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uvx ruff check scripts/
      - run: uvx ruff format --check scripts/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uvx pyrefly check --ignore missing-import --ignore missing-source-for-stubs --ignore missing-attribute scripts/

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npx markdownlint-cli2 "**/*.md" "#node_modules"

  validate-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node scripts/validate-plugin.js ./

  smoke-test:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
    steps:
      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq git graphviz curl fonts-liberation fontconfig > /dev/null 2>&1
          fc-cache -f > /dev/null 2>&1
      - uses: actions/checkout@v4
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Run all scripts
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cd scripts
          # blockdiag/seqdiag are unmaintained and incompatible with Pillow 10+
          SKIP="block-blockdiag.py sequence-seqdiag.py"
          for script in *.py; do
            if echo "$SKIP" | grep -qw "$script"; then
              echo "Skipping $script (unmaintained, requires Pillow<10)"
              continue
            fi
            echo "::group::$script"
            uv run "$script"
            echo "::endgroup::"
          done
      - name: Verify output files exist
        run: |
          count=$(ls scripts/output/*.svg scripts/output/*.png 2>/dev/null | wc -l)
          echo "Generated $count output files"
          ls -la scripts/output/
          if [ "$count" -lt 17 ]; then
            echo "Expected at least 17 output files, got $count"
            exit 1
          fi
      - name: Check output files match committed versions
        run: |
          changed=$(git diff --name-only scripts/output/)
          untracked=$(git ls-files --others --exclude-standard scripts/output/)
          if [ -n "$changed" ] || [ -n "$untracked" ]; then
            echo "::error::Committed outputs are stale. Regenerate with:"
            echo "  ./scripts/regenerate-outputs.sh"
            echo ""
            [ -n "$changed" ] && echo "Changed files:" && echo "$changed"
            [ -n "$untracked" ] && echo "Untracked files:" && echo "$untracked"
            echo ""
            git diff --stat scripts/output/
            exit 1
          fi
          echo "All output files match committed versions."
