name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uvx ruff check scripts/
      - run: uvx ruff format --check scripts/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uvx pyrefly check --ignore missing-import --ignore missing-source-for-stubs --ignore missing-attribute scripts/

  markdown-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npx markdownlint-cli2 "**/*.md" "#node_modules"

  validate-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: node scripts/validate-plugin.js ./

  smoke-test:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:24.04
    steps:
      - name: Install system dependencies
        run: |
          apt-get update -qq
          apt-get install -y -qq git graphviz curl fonts-liberation fontconfig > /dev/null 2>&1
          fc-cache -f > /dev/null 2>&1
      - uses: actions/checkout@v4
      - name: Trust checkout directory
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Run all scripts
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          cd scripts
          # blockdiag/seqdiag are unmaintained and incompatible with Pillow 10+
          SKIP="block-blockdiag.py sequence-seqdiag.py"
          for script in *.py; do
            if echo "$SKIP" | grep -qw "$script"; then
              echo "Skipping $script (unmaintained, requires Pillow<10)"
              continue
            fi
            echo "::group::$script"
            uv run "$script"
            echo "::endgroup::"
          done
      - name: Verify output files exist
        run: |
          count=$(ls scripts/output/*.svg scripts/output/*.png 2>/dev/null | wc -l)
          echo "Generated $count output files"
          ls -la scripts/output/
          if [ "$count" -lt 17 ]; then
            echo "Expected at least 17 output files, got $count"
            exit 1
          fi
      - name: Check output files match committed versions
        run: |
          # Matplotlib SVG output contains architecture-dependent float
          # coordinates (ARM vs x86_64), so we only warn on those diffs.
          # Graphviz/svgwrite outputs are fully deterministic in this container.
          MATPLOTLIB_OUTPUTS="memory-layout-matplotlib.svg network-networkx.svg"

          untracked=$(git ls-files --others --exclude-standard scripts/output/)
          if [ -n "$untracked" ]; then
            echo "::error::New output files not committed. Run and commit:"
            echo "  ./scripts/regenerate-outputs.sh"
            echo "$untracked"
            exit 1
          fi

          changed=$(git diff --name-only scripts/output/)
          strict_failures=""
          for f in $changed; do
            base=$(basename "$f")
            if echo "$MATPLOTLIB_OUTPUTS" | grep -qw "$base"; then
              echo "::warning::$f differs (matplotlib arch-dependent floats — OK)"
            else
              strict_failures="$strict_failures $f"
            fi
          done

          if [ -n "$strict_failures" ]; then
            echo "::error::Committed outputs are stale. Regenerate with:"
            echo "  ./scripts/regenerate-outputs.sh"
            echo ""
            echo "Changed files:$strict_failures"
            git diff --stat $strict_failures
            exit 1
          fi
          echo "All deterministic output files match committed versions."
