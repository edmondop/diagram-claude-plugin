<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <marker markerWidth="9" markerHeight="6" viewBox="-1 -3 9 6" orient="auto" id="arrow">
      <path d="M0,-2.5 L6,0 L0,2.5" fill="#666" stroke="none" />
    </marker>
  </defs>
  <rect x="0" y="0" width="600" height="400" fill="#fff" />

  <!-- Row of three boxes -->
  <rect x="40" y="60" width="120" height="48" rx="6" ry="6" fill="#E8EAF6" stroke="#7986CB" stroke-width="1.5" />
  <text x="100" y="88" font-size="10" fill="#333" text-anchor="middle" font-family="Helvetica">Service A</text>

  <rect x="240" y="60" width="120" height="48" rx="6" ry="6" fill="#E8EAF6" stroke="#7986CB" stroke-width="1.5" />
  <text x="300" y="88" font-size="10" fill="#333" text-anchor="middle" font-family="Helvetica">Service B</text>

  <rect x="440" y="60" width="120" height="48" rx="6" ry="6" fill="#E8EAF6" stroke="#7986CB" stroke-width="1.5" />
  <text x="500" y="88" font-size="10" fill="#333" text-anchor="middle" font-family="Helvetica">Service C</text>

  <!-- Bottom box (target) -->
  <rect x="240" y="300" width="120" height="48" rx="6" ry="6" fill="#E8F5E9" stroke="#81C784" stroke-width="1.5" />
  <text x="300" y="328" font-size="10" fill="#333" text-anchor="middle" font-family="Helvetica">Database</text>

  <!-- Edge label that sits between rows -->
  <text x="350" y="200" font-size="8.5" fill="#555" text-anchor="start" font-family="Helvetica">query data</text>

  <!--
    BUG 1: Bezier path from Service A to Database.
    This curve sweeps right through Service B's rect (x=240..360, y=60..108).
    The testkit's check_line_crosses_text only handles <line> elements,
    not <path> Bezier curves, so this crossing goes undetected.
  -->
  <path d="M100,108 C100,204,300,204,300,300" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arrow)" />

  <!--
    BUG 2: Bezier path from Service C to Database.
    This curve sweeps left through the "query data" edge label.
    Same gap: <path> elements are invisible to check_line_crosses_text.
  -->
  <path d="M500,108 C500,204,300,204,300,300" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arrow)" />

  <!--
    BUG 3: Horizontal path from Service A to Service C goes straight
    through Service B's rect and label.
  -->
  <path d="M160,84 L440,84" stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arrow)" />
</svg>
