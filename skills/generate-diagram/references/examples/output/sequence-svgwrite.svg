x="40" y="94">POST /login</text><line stroke="#222222" stroke-width="1.2" x1="210" x2="390" y1="144" y2="144" /><polygon fill="#222222" points="390,144 384,141 384,147" /><text fill="#222222" font-family="Courier New, Courier, monospace" font-size="11px" font-weight="bold" text-anchor="start" x="220" y="138">validate(credentials)</text><line stroke="#222222" stroke-dasharray="5,3" stroke-width="1.2" x1="390" x2="210" y1="188" y2="188" /><polygon fill="#222222" points="210,188 216,185 216,191" /><text fill="#222222" font-family="Courier New, Courier, monospace" font-size="11px" font-weight="bold" text-anchor="start" x="400" y="182">JWT token</text><line stroke="#222222" stroke-dasharray="5,3" stroke-width="1.2" x1="210" x2="30" y1="232" y2="232" /><polygon fill="#222222" points="30,232 36,229 36,235" /><text fill="#222222" font-family="Courier New, Courier, monospace" font-size="11px" font-weight="bold" text-anchor="start" x="220" y="226">200 OK + Set-Cookie</text><line stroke="#222222" stroke-width="1.2" x1="30" x2="210" y1="276" y2="276" /><polygon fill="#222222" points="210,276 204,273 204,279" /><text fill="#222222" font-family="Courier New, Courier, monospace" font-size="11px" font-weight="bold" text-anchor="start" x="40" y="270">GET /data (Bearer)</text><line stroke="#222222" stroke-width="1.2" x1="210" x2="390" y1="320" y2="320" /><polygon fill="#222222" points="390,320 384,317 384,323" /><text fill="#222222" font-family="Courier New, Courier, monospace" font-size="11px" font-weight="bold" text-anchor="start" x="220" y="314">verify(jwt)</text><line stroke="#222222" stroke-dasharray="5,3" stroke-width="1.2" x1="390" x2="210" y1="364" y2="364" /><polygon fill="#222222" points="210,364 216,361 216,367" /><text fill="#222222" font-family="Courier New, Courier, monospace" font-size="11px" font-weight="bold" text-anchor="start" x="400" y="358">token valid</text><line stroke="#222222" stroke-width="1.2" x1="210" x2="570" y1="408" y2="408" /><polygon fill="#222222" points="570,408 564,405 564,411" /><text fill="#222222" font-family="Courier New, Courier, monospace" font-size="11px" font-weight="bold" text-anchor="start" x="220" y="402">fetchUserData()</text><line stroke="#222222" stroke-dasharray="5,3" stroke-width="1.2" x1="570" x2="210" y1="452" y2="452" /><polygon fill="#222222" points="210,452 216,449 216,455" /><text fill="#222222" font-family="Courier New, Courier, monospace" font-size="11px" font-weight="bold" text-anchor="start" x="580" y="446">JSON payload</text><line stroke="#222222" stroke-dasharray="5,3" stroke-width="1.2" x1="210" x2="30" y1="496" y2="496" /><polygon fill="#222222" points="30,496 36,493 36,499" /><text fill="#222222" font-family="Courier New, Courier, monospace" font-size="11px" font-weight="bold" text-anchor="start" x="220" y="490">200 OK + JSON</text><polygon fill="#FFFDE7" points="590,208 800,208 808,216 808,278 590,278" stroke="#1565C0" stroke-width="0.8" /><polygon fill="#1565C0" fill-opacity="0.15" points="800,208 800,216 808,216" stroke="#1565C0" stroke-width="0.5" /><line stroke="#1565C0" stroke-dasharray="3,3" stroke-width="0.8" x1="570" x2="590" y1="188" y2="243" /><text fill="#222222" font-family="Helvetica, Arial, sans-serif" font-size="10px" font-weight="500" x="598" y="222">Auth Service validates credentials</text><text fill="#222222" font-family="Helvetica, Arial, sans-serif" font-size="10px" font-weight="500" x="598" y="236">and returns a signed JWT. All later</text><text fill="#222222" font-family="Helvetica, Arial, sans-serif" font-size="10px" font-weight="500" x="598" y="250">requests use this token — no session</text><text fill="#222222" font-family="Helvetica, Arial, sans-serif" font-size="10px" font-weight="500" x="598" y="264">state stored on the server.</text></svg>